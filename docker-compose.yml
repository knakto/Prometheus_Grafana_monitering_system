services:
  node-exporter:
    image: prom/node-exporter:master
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - 9100
    networks:
      - pegasus_monitoring
  prometheus:
    image: prom/prometheus:main-distroless
    container_name: prometheus
    volumes:
      - ./prometheus/config/prometheus.yml:/etc/prometheus/prometheus.yml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    expose:
      - 9090
    networks:
      - pegasus_monitoring
  grafana:
    build: grafana
    image: grafana
    container_name: grafana-service
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SERVER_PROTOCOL=https
      - GF_SERVER_CERT_FILE=/etc/grafana/grafana.crt
      - GF_SERVER_CERT_KEY=/etc/grafana/grafana.key
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/config/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - pegasus_monitoring


networks:
  pegasus_monitoring:
    name: pegasus_monitoring
    driver: bridge

volumes:
  grafana-storage:
    name: grafana-storage
